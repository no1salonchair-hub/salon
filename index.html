<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salon Chair | Premium Salon Marketplace</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body style="background-color: #000000; color: #ffffff; margin: 0; font-family: sans-serif;">
    <div id="root">
      <div id="loading-diagnostic" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000000; color: #ffffff; z-index: 9999;">
        <div style="width: 40px; height: 40px; border: 3px solid rgba(147, 51, 234, 0.3); border-top-color: #9333ea; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-size: 12px; opacity: 0.5; letter-spacing: 0.1em; text-transform: uppercase;">Loading Application...</p>
        <style>
          @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script>
      console.log('Index.html: Diagnostic script running');
      window.addEventListener('error', function(e) {
        console.error('Index.html: Captured global error:', e.message);
        const diag = document.getElementById('loading-diagnostic');
        if (diag) {
          diag.innerHTML = '<div style="color: #ef4444; padding: 20px; text-align: center;"><h1>JS Load Error</h1><p>' + e.message + '</p><button onclick="window.location.reload()" style="margin-top: 10px; padding: 8px 16px; background: #9333ea; color: white; border: none; border-radius: 4px;">Retry</button></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
